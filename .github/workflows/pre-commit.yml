name: pre-commit

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: astral-sh/setup-uv@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install web dependencies (bun)
        run: |
          cd docent_core/_web
          bun install --frozen-lockfile

      - name: Setup uv and run pre-commit
        run: |
          uv sync --extra dev
          uv run pre-commit run --all-files --verbose
