name: Dev Deploy
on:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  ENVIRONMENT: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create .env file
        run: |
          echo "ENVIRONMENT=dev" > .env
          echo "OPENAI_API_KEY=${{ secrets.DEV_OPENAI_API_KEY }}" >> .env
          echo "DOCENT_PG_USER=${{ vars.DEV_DATABASE_USER }}" >> .env
          echo "DOCENT_PG_PASSWORD=${{ secrets.DEV_DATABASE_PASSWORD }}" >> .env
          echo "DOCENT_PG_HOST=${{ vars.DEV_DATABASE_HOST }}" >> .env
          echo "DOCENT_PG_PORT=${{ vars.DEV_DATABASE_PORT }}" >> .env
          echo "DOCENT_PG_DATABASE=${{ vars.DEV_DATABASE_NAME }}" >> .env
          echo "DOCENT_REDIS_USER=${{ vars.DEV_REDIS_USER }}" >> .env
          echo "DOCENT_REDIS_PASSWORD=${{ secrets.DEV_REDIS_PASSWORD }}" >> .env
          echo "DOCENT_REDIS_HOST=${{ vars.DEV_REDIS_HOST }}" >> .env
          echo "DOCENT_REDIS_PORT=${{ vars.DEV_REDIS_PORT }}" >> .env
          echo "DOCENT_CORS_ORIGINS=${{ vars.DEV_CORS_ORIGINS }}" >> .env

      - name: Install Modal
        run: |
          python -m pip install --upgrade pip
          pip install modal
          
      - name: Deploy to Modal
        run: modal deploy docent/_server/modal_app.py
        env:
          MODAL_TOKEN_ID: ${{ vars.DEV_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.DEV_MODAL_TOKEN_SECRET }}

        
