name: METR Deploy

on:
  push:
    branches: [metr]
  workflow_dispatch:
    inputs:
      force_full_deploy:
        description: 'Force full deployment (skip change detection)'
        type: boolean
        default: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      deployment_id: metr
      github_environment: metr
      deploy_frontend_apprunner: true
      vercel_environment: Production
      force_full_deploy: ${{ inputs.force_full_deploy || false }}
    secrets: inherit
