name: METR Deploy

on:
  push:
    branches: [metr]
  workflow_dispatch:

env:
  PROJECT_NAME: docent
  DEPLOYMENT_ID: metr
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: metr
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${{ secrets.METR_OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.METR_ANTHROPIC_API_KEY }}
          DOCENT_PG_PASSWORD=${{ secrets.METR_DOCENT_PG_PASSWORD }}
          SENTRY_DSN=${{ vars.SENTRY_DSN }}
          POSTHOG_API_KEY=${{ secrets.METR_POSTHOG_API_KEY }}
          COOKIE_DOMAIN=${{ vars.COOKIE_DOMAIN }}
          DOCENT_CORS_ORIGINS=${{ vars.DOCENT_CORS_ORIGINS }}
          EOF

      - name: Build and push backend to ECR
        run: ./scripts/ecr_push_backend.sh
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Build and push frontend to ECR
        run: ./scripts/ecr_push_frontend.sh
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          NEXT_PUBLIC_API_HOST: ${{ vars.METR_API_HOST }}

      - name: Run DB migrations (ECS one-off task)
        env:
          AWS_PAGER: ""
        run: |
          set -euo pipefail
          TASK_DEF_ARN=$(aws ecs describe-task-definition --task-definition ${{ env.PROJECT_NAME }}-${{ env.DEPLOYMENT_ID }}-migrations --query 'taskDefinition.taskDefinitionArn' --output text)
          VPC_ID=$(aws ec2 describe-vpcs --filters Name=tag:Name,Values=${{ env.PROJECT_NAME }}-${{ env.DEPLOYMENT_ID }}-vpc --query 'Vpcs[0].VpcId' --output text)
          SUBNETS=$(aws ec2 describe-subnets --filters Name=vpc-id,Values=$VPC_ID Name=tag:Type,Values=Private --query 'Subnets[*].SubnetId' --output text)
          SG_ID=$(aws ec2 describe-security-groups --filters Name=tag:Name,Values=${{ env.PROJECT_NAME }}-${{ env.DEPLOYMENT_ID }}-ecs-tasks-sg --query 'SecurityGroups[0].GroupId' --output text)
          SUBNETS_CSV=$(echo "$SUBNETS" | tr '\t' ',' | tr ' ' ',')

          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.PROJECT_NAME }}-${{ env.DEPLOYMENT_ID }}-cluster \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS_CSV],securityGroups=[$SG_ID],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)

          echo "Waiting for migration task ($TASK_ARN) to complete..."
          aws ecs wait tasks-stopped --cluster ${{ env.PROJECT_NAME }}-${{ env.DEPLOYMENT_ID }}-cluster --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster ${{ env.PROJECT_NAME }}-${{ env.DEPLOYMENT_ID }}-cluster --tasks "$TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-${{ env.DEPLOYMENT_ID }}-cluster \
            --service ${{ env.PROJECT_NAME }}-${{ env.DEPLOYMENT_ID }}-worker \
            --force-new-deployment

      - name: Deploy App Runner API (manual trigger, only if ECS succeeded)
        env:
          AWS_PAGER: ""
        run: |
          set -euo pipefail
          SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='${{ env.PROJECT_NAME }}-${{ env.DEPLOYMENT_ID }}-api'].ServiceArn | [0]" --output text)
          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" == "None" ]; then
            echo "App Runner service not found" >&2
            exit 1
          fi
          echo "Triggering manual App Runner deployment for $SERVICE_ARN"
          aws apprunner start-deployment --service-arn "$SERVICE_ARN"
