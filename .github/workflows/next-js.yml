name: Next.js build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nextjs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Preview
    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_HOST: ${{ vars.NEXT_PUBLIC_API_HOST || 'http://localhost:8888' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Prepare Next.js cache directory
        run: mkdir -p docent_core/_web/.next/cache

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: docent_core/_web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('docent_core/_web/bun.lock*') }}-${{ hashFiles('docent_core/_web/**.[jt]s', 'docent_core/_web/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: bun install
        working-directory: docent_core/_web

      - name: Build with Next.js
        run: bun run build
        working-directory: docent_core/_web
