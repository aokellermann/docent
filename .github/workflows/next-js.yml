name: Next.js build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nextjs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Preview
    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docent_core/_web/package-lock.json
      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: docent_core/_web/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('docent_core/_web/package-lock.json') }}-${{ hashFiles('docent_core/_web/**.[jt]s', 'docent_core/_web/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - name: Install dependencies
        run: npm ci
        working-directory: docent_core/_web
      - name: Build with Next.js
        run: npm run build
        working-directory: docent_core/_web
