name: Reusable Deploy Workflow

on:
  workflow_call:
    inputs:
      deployment_id:
        description: "Deployment identifier (e.g., prod, staging, metr, bwater)"
        required: true
        type: string
      github_environment:
        description: "GitHub environment name"
        required: true
        type: string
      deploy_frontend_vercel:
        description: "Deploy frontend to Vercel"
        required: false
        type: boolean
        default: false
      vercel_environment:
        description: "Vercel environment (production or preview)"
        required: false
        type: string
      force_full_deploy:
        description: "Force full deployment regardless of changes"
        required: false
        type: boolean
        default: false

env:
  PROJECT_NAME: docent
  AWS_REGION: us-east-1

concurrency:
  group: docent-${{ inputs.deployment_id }}-deploy
  cancel-in-progress: true

jobs:
  # Scan for changes in the repository to determine which services need to be redeployed
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate comparison on force-push

      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          # Compare against previous branch HEAD (handles force-push correctly)
          # Falls back to default behavior if before is null (new branch)
          base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || '' }}
          filters: |
            backend:
              - 'docent_core/**'
              - '!docent_core/_web/**'
              - 'docent/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Dockerfile.backend'
              - 'alembic/**'
            frontend:
              - 'docent_core/_web/**'
              - 'Dockerfile.frontend'
            migrations:
              - 'alembic/**'

  backend-deploy:
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || inputs.force_full_deploy }}
    environment: ${{ inputs.github_environment }}
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create .env file
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          DOCENT_PG_PASSWORD=${{ secrets.DOCENT_PG_PASSWORD }}
          SENTRY_DSN=${{ vars.SENTRY_DSN }}
          POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}
          COOKIE_DOMAIN=${{ vars.COOKIE_DOMAIN }}
          DOCENT_CORS_ORIGINS=${{ vars.DOCENT_CORS_ORIGINS }}
          INVESTIGATOR_ADMIN_EMAILS=${{ vars.INVESTIGATOR_ADMIN_EMAILS }}
          FREE_USAGE_CAP_CENTS=${{ vars.FREE_USAGE_CAP_CENTS }}
          EOF

      - name: Build and push backend to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}/${{ inputs.deployment_id }}/backend:latest
          cache-from: type=gha,scope=backend-${{ inputs.deployment_id }}
          cache-to: type=gha,mode=max,scope=backend-${{ inputs.deployment_id }}

      # DB migrations are skipped if there are no alembic migrations to run
      - name: Run DB migrations (ECS one-off task)
        if: ${{ needs.changes.outputs.migrations == 'true' || inputs.force_full_deploy }}
        env:
          AWS_PAGER: ""
        run: |
          set -euo pipefail
          TASK_DEF_ARN=$(aws ecs describe-task-definition --task-definition ${{ env.PROJECT_NAME }}-${{ inputs.deployment_id }}-migrations --query 'taskDefinition.taskDefinitionArn' --output text)
          VPC_ID=$(aws ec2 describe-vpcs --filters Name=tag:Name,Values=${{ env.PROJECT_NAME }}-${{ inputs.deployment_id }}-vpc --query 'Vpcs[0].VpcId' --output text)
          SUBNETS=$(aws ec2 describe-subnets --filters Name=vpc-id,Values=$VPC_ID Name=tag:Type,Values=Private --query 'Subnets[*].SubnetId' --output text)
          SG_ID=$(aws ec2 describe-security-groups --filters Name=tag:Name,Values=${{ env.PROJECT_NAME }}-${{ inputs.deployment_id }}-ecs-tasks-sg --query 'SecurityGroups[0].GroupId' --output text)
          SUBNETS_CSV=$(echo "$SUBNETS" | tr '\t' ',' | tr ' ' ',')

          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.PROJECT_NAME }}-${{ inputs.deployment_id }}-cluster \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS_CSV],securityGroups=[$SG_ID],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)

          echo "Waiting for migration task ($TASK_ARN) to complete..."
          aws ecs wait tasks-stopped --cluster ${{ env.PROJECT_NAME }}-${{ inputs.deployment_id }}-cluster --tasks "$TASK_ARN"
          EXIT_CODE=$(aws ecs describe-tasks --cluster ${{ env.PROJECT_NAME }}-${{ inputs.deployment_id }}-cluster --tasks "$TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Force ECS deployments
        run: |
          set -euo pipefail
          for suffix in worker telemetry-processing-worker telemetry-ingest-worker datadog-agent; do
            service_name="${{ env.PROJECT_NAME }}-${{ inputs.deployment_id }}-$suffix"
            echo "Forcing new deployment for $service_name"
            aws ecs update-service \
              --cluster ${{ env.PROJECT_NAME }}-${{ inputs.deployment_id }}-cluster \
              --service "$service_name" \
              --force-new-deployment
          done

      - name: Deploy App Runner API
        env:
          AWS_PAGER: ""
        run: |
          set -euo pipefail
          SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='${{ env.PROJECT_NAME }}-${{ inputs.deployment_id }}-api'].ServiceArn | [0]" --output text)
          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" == "None" ]; then
            echo "App Runner service not found" >&2
            exit 1
          fi
          echo "Triggering manual App Runner deployment for $SERVICE_ARN"
          aws apprunner start-deployment --service-arn "$SERVICE_ARN"

  frontend-vercel-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    needs: [changes, backend-deploy]
    # Run if frontend deploy enabled AND (frontend changed OR force_full_deploy) AND backend didn't fail
    if: ${{ always() && inputs.deploy_frontend_vercel && (needs.changes.outputs.frontend == 'true' || inputs.force_full_deploy) && needs.backend-deploy.result != 'failure' }}
    timeout-minutes: 10
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_API_HOST: ${{ vars.NEXT_PUBLIC_API_HOST }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: docent_core/_web/node_modules
          key: node-modules-${{ hashFiles('docent_core/_web/bun.lock') }}

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: docent_core/_web/.next/cache
          key: nextjs-${{ inputs.deployment_id }}-${{ hashFiles('docent_core/_web/bun.lock') }}-${{ hashFiles('docent_core/_web/**/*.ts', 'docent_core/_web/**/*.tsx') }}
          restore-keys: |
            nextjs-${{ inputs.deployment_id }}-${{ hashFiles('docent_core/_web/bun.lock') }}-
            nextjs-${{ inputs.deployment_id }}-

      # Install dependencies with Bun (faster than npm ci)
      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: docent_core/_web
        run: bun install --frozen-lockfile

      - name: Install Vercel CLI
        run: bun install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ inputs.vercel_environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: |
          vercel build --target=${{ inputs.vercel_environment }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: |
          vercel deploy --prebuilt --target=${{ inputs.vercel_environment }} --token=${{ secrets.VERCEL_TOKEN }}
