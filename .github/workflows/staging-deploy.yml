name: Staging Deploy

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      force_full_deploy:
        description: 'Force full deployment (skip change detection)'
        type: boolean
        default: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      deployment_id: staging
      github_environment: staging
      # We use staging to test both deployment pathways
      deploy_frontend_vercel: true
      vercel_environment: staging
      force_full_deploy: ${{ inputs.force_full_deploy || false }}
    secrets: inherit
