name: Prod Deploy

on:
  push:
    branches: [prod]
  workflow_dispatch:
    inputs:
      force_full_deploy:
        description: 'Force full deployment (skip change detection)'
        type: boolean
        default: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      deployment_id: prod
      github_environment: Production
      deploy_frontend_vercel: true
      vercel_environment: production
      force_full_deploy: ${{ inputs.force_full_deploy || false }}
    secrets: inherit
