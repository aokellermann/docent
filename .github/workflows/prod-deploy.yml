name: Prod Deploy

on:
  push:
    branches: [prod]
  workflow_dispatch:

env:
  PROJECT_NAME: docent
  ENVIRONMENT: prod
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          DOCENT_PG_PASSWORD=${{ secrets.DOCENT_PG_PASSWORD }}
          SENTRY_DSN=${{ vars.SENTRY_DSN }}
          POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }}
          EOF

      - name: Build and push backend to ECR
        run: ./scripts/ecr_push_backend.sh
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-cluster \
            --service ${{ env.PROJECT_NAME }}-${{ env.ENVIRONMENT }}-worker \
            --force-new-deployment
