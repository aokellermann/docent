name: Production Deploy
on:
  push:
    branches: [gregor/deploy-dev]
  workflow_dispatch:
env:
  VERCEL_PROJECT_ID: ${{ secrets.PROD_VERCEL_TEAM_ID }}
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create .env file
        run: |
          echo "OPENAI_API_KEY=${{ secrets.PROD_OPENAI_API_KEY }}" >> .env
          echo "DOCENT_PG_USER=${{ vars.PROD_DATABASE_USER }}" >> .env
          echo "DOCENT_PG_PASSWORD=${{ secrets.PROD_DATABASE_PASSWORD }}" >> .env
          echo "DOCENT_PG_HOST=${{ vars.PROD_DATABASE_HOST }}" >> .env
          echo "DOCENT_PG_PORT=${{ vars.PROD_DATABASE_PORT }}" >> .env
          echo "DOCENT_PG_DATABASE=${{ vars.PROD_DATABASE_NAME }}" >> .env
          echo "DOCENT_REDIS_USER=${{ vars.PROD_REDIS_USER }}" >> .env
          echo "DOCENT_REDIS_PASSWORD=${{ secrets.PROD_REDIS_PASSWORD }}" >> .env
          echo "DOCENT_REDIS_HOST=${{ vars.PROD_REDIS_HOST }}" >> .env
          echo "DOCENT_REDIS_PORT=${{ vars.PROD_REDIS_PORT }}" >> .env
          echo "DOCENT_CORS_ORIGINS=${{ vars.PROD_CORS_ORIGINS }}" >> .env

      - name: Install Modal
        run: |
          python -m pip install --upgrade pip
          pip install modal
          
      - name: Deploy to Modal
        run: modal deploy docent/_server/modal_app.py
        env:
          MODAL_TOKEN_ID: ${{ vars.PROD_MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.PROD_MODAL_TOKEN_SECRET }}

        
