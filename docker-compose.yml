services:
  redis:
    image: redis:alpine
    container_name: docent_redis
    ports:
      - "${DOCENT_REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: docent_postgres
    environment:
      POSTGRES_USER: ${DOCENT_PG_USER:-docent_user}
      POSTGRES_PASSWORD: ${DOCENT_PG_PASSWORD:-docent_password}
      POSTGRES_DB: ${DOCENT_PG_DATABASE:-docent_db}
    ports:
      - "${DOCENT_PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: docent_backend
    ports:
      - "${DOCENT_SERVER_PORT:-8888}:${DOCENT_SERVER_PORT:-8888}"
    depends_on:
      - postgres
      - redis
    # Uncomment to forward SSH agent to the container
    # volumes:
    #   - ${SSH_AUTH_SOCK}:/ssh-agent
    # environment:
    #   - SSH_AUTH_SOCK=/ssh-agent
    command: bash -c "bash /app/scripts/adjust_env_in_docker.sh && docent server --port ${DOCENT_SERVER_PORT:-8888} --workers 4"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: docent_frontend
    ports:
      - "${DOCENT_WEB_PORT:-3000}:${DOCENT_WEB_PORT:-3000}"
    command: docent web --build --no-install --port ${DOCENT_WEB_PORT:-3000} --backend-url ${DOCENT_BACKEND_HOST:-http://localhost}:${DOCENT_SERVER_PORT:-8888}
    restart: unless-stopped

volumes:
  pgdata:
